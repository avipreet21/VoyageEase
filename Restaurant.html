<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Restaurant.css">
    <script src="Restaurant.js" defer></script>
    <title>VoyageEase: Restaurant Reservation</title>
</head>
<body>
    <div class="hero">
        <div class="navbar">
            <a href="index.html"><img src="Images/logo.png" class="logo"></a>
        </div>
        <div class="image-container">
            <img src="Images/restaurant.jpg" alt="Crowd">
        </div>
        <div class="main_content">
            <div class="search_container">
                <div class="box">
                    <form name="search">
                        <input id="city" type="text" class="input" name="txt" placeholder="City Name.." value="Vancouver"><br>
                        <button id="submit_button" class="take_button" type="button">Submit</button>
                    </form>
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <div class="restaurants">
                <div class="choice_container">
                    <ul class="restaurant_list">
                    </ul>
                </div>
                <div class="restaurant_info">
                    <ul class="info_list">
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
